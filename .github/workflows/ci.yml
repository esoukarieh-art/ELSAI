name: CI

on:
  pull_request:
    paths:
      - "elsai-poc/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]

defaults:
  run:
    working-directory: elsai-poc

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: elsai-poc/backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: elsai-poc/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        working-directory: elsai-poc/backend
        run: ruff check .

      - name: Format check (ruff format)
        working-directory: elsai-poc/backend
        run: ruff format --check .

      - name: Tests (pytest)
        working-directory: elsai-poc/backend
        run: pytest

  frontend:
    name: Frontend (prettier + eslint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: elsai-poc/frontend/package-lock.json

      - name: Install dependencies
        working-directory: elsai-poc/frontend
        run: npm ci

      - name: Prettier check
        working-directory: elsai-poc/frontend
        run: npm run format:check

      - name: ESLint
        working-directory: elsai-poc/frontend
        run: npm run lint

      - name: Build
        working-directory: elsai-poc/frontend
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: elsai-poc/backend
          push: false
          tags: elsai-poc-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: elsai-poc/frontend
          push: false
          tags: elsai-poc-frontend:ci
